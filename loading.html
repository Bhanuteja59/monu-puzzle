<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Skeleton Loading Demo</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body style="background:var(--bg-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column;">
    
    <!-- Skeleton Header -->
    <header class="top-header" style="height: 60px; background: white; padding: 0 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee;">
        <div class="skeleton-box" style="height: 24px; width: 120px; border-radius: 4px;"></div>
        <div class="skeleton-box" style="height: 32px; width: 80px; border-radius: 20px;"></div>
    </header>

    <div class="content-wrapper" style="flex: 1; overflow: hidden; padding: 16px;">
        <!-- Skeleton Featured Slider -->
        <div class="featured-slider-wrapper" style="margin-bottom: 24px;">
            <div class="skeleton-box" style="height: 220px; border-radius: 20px; width: 100%;"></div>
            <div style="display: flex; justify-content: flex-end; gap: 6px; margin-top: 10px; margin-right: 10px;">
                <div class="skeleton-box" style="height: 6px; width: 20px; border-radius: 3px;"></div>
                <div class="skeleton-box" style="height: 6px; width: 6px; border-radius: 3px;"></div>
                <div class="skeleton-box" style="height: 6px; width: 6px; border-radius: 3px;"></div>
            </div>
        </div>
        
        <!-- Skeleton Category Tabs -->
        <div style="display: flex; gap: 12px; margin-bottom: 24px; overflow: hidden;">
            <div class="skeleton-box" style="height: 38px; width: 70px; border-radius: 20px; flex-shrink: 0;"></div>
            <div class="skeleton-box" style="height: 38px; width: 110px; border-radius: 20px; flex-shrink: 0;"></div>
            <div class="skeleton-box" style="height: 38px; width: 100px; border-radius: 20px; flex-shrink: 0;"></div>
            <div class="skeleton-box" style="height: 38px; width: 90px; border-radius: 20px; flex-shrink: 0;"></div>
        </div>
        
        <!-- Skeleton Grid -->
        <div class="puzzle-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="skeleton-box skeleton-card"></div>
            <div class="skeleton-box skeleton-card"></div>
            <!-- Simulating locked cards in skeleton -->
            <div class="skeleton-box skeleton-card" style="filter: brightness(0.7);"></div>
            <div class="skeleton-box skeleton-card" style="filter: brightness(0.7);"></div>
        </div>
    </div>

    <!-- Skeleton Sidebar/Nav -->
    <div style="height: 70px; background: white; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-around; padding: 0 10px;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
            <div class="skeleton-box" style="height: 24px; width: 24px; border-radius: 6px;"></div>
            <div class="skeleton-box" style="height: 10px; width: 40px; border-radius: 2px;"></div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
            <div class="skeleton-box" style="height: 24px; width: 24px; border-radius: 6px;"></div>
            <div class="skeleton-box" style="height: 10px; width: 40px; border-radius: 2px;"></div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
            <div class="skeleton-box" style="height: 24px; width: 24px; border-radius: 6px;"></div>
            <div class="skeleton-box" style="height: 10px; width: 40px; border-radius: 2px;"></div>
        </div>
        <div style="display: flex; flex-direction: column; align-items: center; gap: 6px;">
            <div class="skeleton-box" style="height: 24px; width: 24px; border-radius: 6px;"></div>
            <div class="skeleton-box" style="height: 10px; width: 40px; border-radius: 2px;"></div>
        </div>
    </div>

</body>
</html>
